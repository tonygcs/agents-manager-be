workerd:
  addr: "localhost:50051"

server:
  addr: ":8080"

secrets:
  GITHUB_TOKEN: "<your-token-here>"

workers:
  opencode-node:
    image: opencode-worker-node:latest
    cmd:
      - sh
      - -c
      - 'trap ''exit 0'' TERM; opencode web --hostname 0.0.0.0 --mdns-domain {{index (split .name "-") 0}}.localhost & wait $!'
    labels:
      "traefik.enable": "true"
      'traefik.http.routers.{{index (split .name "-") 0}}.rule': 'Host(`{{index (split .name "-") 0}}.localhost`)'
      'traefik.http.services.{{index (split .name "-") 0}}.loadbalancer.server.port': "4096"
      "agentmanager.description": 'Access in the url http://{{index (split .name "-") 0}}.localhost/'
    secrets:
      - GITHUB_TOKEN
  countdown:
    image: debian:latest
    cmd:
      - bash
      - -c
      - 'trap ''exit 0'' TERM; for i in $(seq 1 200); do echo "tick $i"; sleep 1 & wait $!; done'
