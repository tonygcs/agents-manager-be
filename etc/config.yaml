workerd:
  addr: "localhost:50051"

server:
  addr: ":8080"

secrets:
  GITHUB_TOKEN: "<your-token-here>"

workers:
  opencode-node:
    image: opencode-worker-node:latest
    cmd:
      - sh
      - -c
      - "trap 'exit 0' TERM; opencode web --hostname 0.0.0.0 --mdns-domain {{name}}.localhost & wait $!"
    labels:
      "traefik.enable": "true"
      "traefik.http.routers.{{name}}.rule": "Host(`{{name}}.localhost`)"
      "traefik.http.services.{{name}}.loadbalancer.server.port": "4096"
      "agentmanager.description": "Access in the url http://{{name}}.localhost/"
    secrets:
      - GITHUB_TOKEN
  countdown:
    image: debian:latest
    cmd:
      - bash
      - -c
      - "trap 'exit 0' TERM; for i in $(seq 1 200); do echo \"tick $i\"; sleep 1 & wait $!; done"
