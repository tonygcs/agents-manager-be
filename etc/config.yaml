workerd:
  addr: "localhost:50051"

server:
  addr: ":8080"

secrets:
  GITHUB_TOKEN: "<your-token-here>"

workers:
  opencode-node:
    image: opencode-worker-node:latest
    description: AI coding agent powered by opencode, running on Debian with Node.js support for JavaScript and TypeScript projects.
    cmd:
      - sh
      - -c
      - "trap 'exit 0' TERM; opencode web --hostname 0.0.0.0 & wait $!"
    labels:
      "traefik.enable": "true"
      'traefik.http.routers.{{index (split .name "-") 0}}.rule': 'HostRegexp(`{{index (split .name "-") 0}}\\.[^.]+$`)'
      'traefik.http.services.{{index (split .name "-") 0}}.loadbalancer.server.port': "4096"
      "agentmanager.description": 'Access in the url http://{{index (split .name "-") 0}}.{{rootdomain .domain}}/'
    secrets:
      - GITHUB_TOKEN
  countdown:
    image: debian:latest
    description: Debian servier that executes a countdown until 200 seconds. It ends after those 200 seconds.
    cmd:
      - bash
      - -c
      - 'trap ''exit 0'' TERM; for i in $(seq 1 200); do echo "tick $i"; sleep 1 & wait $!; done'
